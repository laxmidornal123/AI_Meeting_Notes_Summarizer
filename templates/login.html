<html>
{% extends "layout.html" %}

{% block content %}

<div class="container-fluid min-vh-100 d-flex justify-content-center align-items-center">

    <div class="row w-100 justify-content-center">

        <div class="col-lg-5 col-md-7 col-sm-10">

            <div class="glass shadow-lg p-5 rounded-4">

                <!-- Logo -->

                <div class="text-center mb-4">

                    <i class="bi bi-robot display-1 text-primary"></i>

                    <h2 class="mt-3 fw-bold">

                        AI Meeting Notes

                    </h2>

                    <p class="text-muted">

                        Login to continue

                    </p>

                    <div class="mb-3">

                        <span class="badge bg-primary me-2">AI Powered</span>

                        <span class="badge bg-success me-2">Whisper</span>

                        <span class="badge bg-warning text-dark me-2">Gemini</span>

                        <span class="badge bg-danger">PDF Reports</span>

                    </div>

                </div>

                <!-- Welcome -->

                <div class="alert alert-primary">

                    <i class="bi bi-info-circle-fill"></i>

                    Securely login to access your AI Meeting Notes Dashboard.

                </div>

                <!-- Login Form -->

                <form method="POST">

                    <!-- Email -->

                    <div class="mb-3">

                        <label class="form-label">

                            Email

                        </label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-envelope-fill"></i>

                            </span>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter your email"
                                required>

                        </div>

                    </div>

                    <!-- Password -->

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <div class="input-group">

                            <span class="input-group-text">

                                <i class="bi bi-lock-fill"></i>

                            </span>

                            <input
                                type="password"
                                id="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter your password"
                                required>

                            <button
                                type="button"
                                class="btn btn-outline-light"
                                onclick="togglePassword()">

                                <i class="bi bi-eye-fill"></i>

                            </button>

                        </div>

                    </div>

                    <!-- Remember -->

                    <div class="d-flex justify-content-between align-items-center mb-4">

                        <div class="form-check">

                            <input
                                class="form-check-input"
                                type="checkbox"
                                name="remember"
                                id="remember">

                            <label
                                class="form-check-label"
                                for="remember">

                                Remember Me

                            </label>

                        </div>

                    </div>

                    <!-- Login Button -->

                    <button
                        class="btn btn-primary btn-lg w-100">

                        <i class="bi bi-box-arrow-in-right"></i>

                        Login

                    </button>

                </form>

                <hr>

                <!-- Register -->

                <div class="text-center">

                    Don't have an account?

                    <a href="{{ url_for('auth.register') }}">

                        Register

                    </a>

                </div>

                <hr>

                <!-- Footer -->

                <p class="text-center text-muted small mb-0">

                    AI Meeting Notes Summarizer © 2026

                </p>

            </div>

        </div>

    </div>

</div>

<script>

function togglePassword(){

    let x = document.getElementById("password");

    if(x.type === "password"){

        x.type = "text";

    }

    else{

        x.type = "password";

    }

}

</script>

{% endblock %}
