{% extends "layout.html" %}

{% block content %}

<div class="container mt-4">

    <h2>
        <i class="bi bi-file-earmark-pdf-fill"></i>
        AI Reports
    </h2>

    <hr>

    {% if reports %}

    <div class="table-responsive">

        <table class="table table-dark table-hover">

            <thead>

                <tr>

                    <th>#</th>
                    <th>Meeting</th>
                    <th>Date</th>
                    <th>Report</th>

                </tr>

            </thead>

            <tbody>

            {% for report in reports %}

                <tr>

                    <td>{{ loop.index }}</td>

                    <td>{{ report.filename }}</td>

                    <td>{{ report.upload_date.strftime('%d-%m-%Y') }}</td>

                    <td>

                        <a href="{{ url_for('history.download_report', id=report.id) }}"
                           class="btn btn-success btn-sm">

                            <i class="bi bi-download"></i>

                            Download PDF

                        </a>

                    </td>

                </tr>

            {% endfor %}

            </tbody>

        </table>

    </div>

    {% else %}

    <div class="alert alert-info">

        No reports available.

    </div>

    {% endif %}

</div>

{% endblock %}
