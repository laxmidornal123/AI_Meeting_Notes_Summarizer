<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Meeting Notes Summarizer</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->

    <aside class="sidebar" id="sidebar">

        <div class="logo">

            <i class="bi bi-robot"></i>

            <span>AI Meeting</span>

        </div>

        <ul class="menu">

            <li>

                <a href="{{ url_for('dashboard') }}">

                    <i class="bi bi-grid-fill"></i>

                    Dashboard

                </a>

            </li>

            <li>

                <a href="{{ url_for('upload.upload') }}">

                    <i class="bi bi-cloud-upload-fill"></i>

                    Upload

                </a>

            </li>

            <li>

                <a href="{{ url_for('history.history') }}">

                    <i class="bi bi-clock-history"></i>

                    History

                </a>

            </li>

            <li>

<a href="{{ url_for('reports.reports') }}">
                    <i class="bi bi-file-earmark-pdf-fill"></i>

                    Reports

                </a>

            </li>

            <li>

                <a href="{{ url_for('profile.profile') }}">

                    <i class="bi bi-person-circle"></i>

                    Profile

                </a>

            </li>

            
            <li>

                <a href="{{ url_for('auth.logout') }}">

                    <i class="bi bi-box-arrow-right"></i>

                    Logout

                </a>

            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main">

        <!-- Navbar -->

        <nav class="topbar">

            <button class="menu-btn"
                    id="menuBtn">

                <i class="bi bi-list"></i>

            </button>

            <div>

                <h4 class="page-heading">

                    AI Meeting Notes Summarizer

                </h4>

            </div>

            <div class="top-actions">
              <button class="icon-btn" onclick="showNotification()">

    <i class="bi bi-bell-fill"></i>

</button>

         <button class="icon-btn" onclick="toggleTheme()">

    <i class="bi bi-moon-fill" id="themeIcon"></i>

</button>
                <a href="{{ url_for('profile.profile') }}" class="profile">

    <i class="bi bi-person-circle"></i>

</a>
            </div>

        </nav>

        <!-- Flash Messages -->

        {% with messages = get_flashed_messages() %}

            {% if messages %}

                {% for message in messages %}

                    <div class="alert alert-success mt-3">

                        {{ message }}

                    </div>

                {% endfor %}

            {% endif %}

        {% endwith %}

        <!-- Page Content -->

        <div class="content">

            {% block content %}

            {% endblock %}

        </div>

    </main>

</div>

<!-- Bootstrap -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>

const sidebar = document.getElementById("sidebar");
const menuBtn = document.getElementById("menuBtn");

menuBtn.addEventListener("click", function () {
    sidebar.classList.toggle("show");
});

// Notification

function showNotification(){

    alert("🔔 No new notifications");

}

// Dark / Light Mode

function toggleTheme(){

    document.body.classList.toggle("light-mode");

    let icon=document.getElementById("themeIcon");

    if(document.body.classList.contains("light-mode")){

        icon.className="bi bi-sun-fill";

    }

    else{

        icon.className="bi bi-moon-fill";

    }

}

</script>
</body>

</html>
